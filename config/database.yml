default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS", 5) %>
  url: <%= ENV.fetch("DATABASE_URL", "postgresql://fintrack:fintrack@localhost:5432/fintrack") %>

development:
  <<: *default

test:
  <<: *default
  url: <%= ENV.fetch("DATABASE_TEST_URL", ENV.fetch("DATABASE_URL", "postgresql://fintrack:fintrack@localhost:5432/fintrack_test")) %>

production:
  <<: *default


